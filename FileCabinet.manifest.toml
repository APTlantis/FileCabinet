tasks = [
  "Run unit tests",
  "Build self-contained Windows x64 publish output",
  "Build WiX MSI installer",
  "Attach MSI to GitHub release",
  "Include release notes from docs/FileCabinet v1.7.3 — Vault Health Workspace Patch.md",
  "Record SHA-256 with Get-FileHash",
  "Document unsigned status"
]

[theme]
id = "blue-slate"
name = "Aptlantis Blue Slate"
mode = "dark"
resource_dictionary = "Themes/BlueSlate.xaml"
merged_from = "Application.xaml"
principles = [
  "Semantic color over decorative accent",
  "Cyan and teal for navigation, focus, and structure",
  "Violet and indigo for taxonomy, archive, vault, and classification states",
  "Amber and brass for warnings, priority, preflight notes, and attention states",
  "Green for health and verification, with local danger/build extensions for destructive and package-like states"
]

[notes]
current_highlights = [
  "Blue Slate theme resources now live in a dedicated WPF ResourceDictionary",
  "MainWindow uses shared theme brushes instead of inline palette resources",
  "Cyan and teal navigation/focus resources now follow Blue Slate semantic tokens",
  "Blue Slate accents are used sparingly for action, focus, attention, taxonomy, archive, health, build, and danger states",
  "Preview and activity accents now use Blue Slate semantic palette constants",
  "Application and installer icon assets were refreshed from the new FileCabinet logo mark",
  "Application, CLI, and manifest version updated to 1.7.3",
  "Added 24 optional compatibility hashes and checksums across archival, legacy, and fast hash families",
  "New non-legacy hash values are stored in the extensible artifact hashes dictionary",
  "Active hash computation now respects Settings across ingest, health, repair, rescan, and headless paths",
  "New catalogs default to SHA-256 only while preserving opt-in BLAKE3, KangarooTwelve, SHA3-256, Skein, legacy, checksum, and non-cryptographic compatibility hashes",
  "Settings groups hash choices by recommended, modern strong, legacy cryptographic, compatibility checksum, and compatibility non-cryptographic purposes",
  "Details shows a focused standard hash summary plus active or retained legacy hash values instead of every supported checksum",
  "Preview and Relations are combined in the right panel, with the top five related artifacts directly below the preview",
  "Health tab now provides a comprehensive Analyze & Fix workspace with grouped findings, repairable/review-only counts, filters, safe selection controls, and bulk path rebind support",
  "Material Symbols source vocabulary mapped to category-specific artifact list and preview icons",
  "Borderless maximize now respects the Windows taskbar work area",
  "Release verification for v1.7.3 records SHA-256 only with Get-FileHash",
  "FileCabinet-1.7.3.0-win-x64.msi was built and SHA-256 hashed on 2026-06-19",
  "Vault Health is now a dedicated main workspace with Overview, Repairs, Findings, and History sections",
  "Default Vault Health analysis is metadata-first and does not automatically compute or verify retained-file hashes",
  "Verify small hashes is limited to retained files up to 1 GB",
  "Bulk repair selection supports safe automatic, visible-only, and per-action selection while excluding review-only rows",
  "Selected repair application reports per-item progress during hash recompute and generated-asset repair actions",
  "Health analysis defers automatic hash mismatch verification for retained files larger than 16 GB",
  "Missing-hash analysis no longer hashes files when there are no comparable active catalog hashes",
  "Default cryptographic hash computation shares one sequential read pass for explicit ingest and repair hashing",
  "Murmur3-32 and xxHash64 compatibility hashes now stream instead of loading full files into memory",
  "Hash Choices and Compatibility help documentation explains recommended, modern, legacy, checksum, and non-cryptographic hash families"
]
not_in_scope = [
  "Automatic restore execution",
  "Automatic hash mismatch resolution",
  "Destructive cleanup of orphan generated assets"
]
design_boundaries = [
  "Deterministic recall over automatic inference",
  "Operator-authored context over generated categorization",
  "Inspectable metadata over opaque ranking",
  "Repairable local vault state over cloud dependency"
]
last_verified = "dotnet build FileCabinet.slnx --configuration Release --no-restore --no-incremental succeeded on 2026-06-19; dotnet test FileCabinet.Tests/FileCabinet.Tests.vbproj --configuration Release --no-restore passed 104 tests; installer/build-installer.ps1 -Version 1.7.3.0 completed; SHA-256 recorded with Get-FileHash; signing not generated"
