name: SonarQube

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    name: Build and analyze
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: zulu

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v5
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -Path "${{ runner.temp }}\scanner" -ItemType Directory -Force | Out-Null
          dotnet tool update dotnet-sonarscanner --tool-path "${{ runner.temp }}\scanner"

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore FileCabinet.slnx
          dotnet restore FileCabinet.Tests\FileCabinet.Tests.vbproj

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SONAR_TOKEN)) {
            throw "SONAR_TOKEN secret is not configured."
          }

          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" begin `
            /k:"APTlantis_FileCabinet" `
            /o:"aptlantis" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.cs.opencover.reportsPaths="FileCabinet.Tests\TestResults\coverage.opencover.xml" `
            /d:sonar.token="$env:SONAR_TOKEN"

          dotnet build FileCabinet.slnx --configuration Release --no-restore --no-incremental
          dotnet test FileCabinet.Tests\FileCabinet.Tests.vbproj `
            --configuration Release `
            --no-restore `
            /p:CollectCoverage=true `
            /p:CoverletOutput=TestResults\ `
            /p:CoverletOutputFormat=opencover

          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" end `
            /d:sonar.token="$env:SONAR_TOKEN"
