[governance]
primary_standard = "DRS"
primary_standard_path = "D:\\.library\\aptlantis_core\\DRS\\README.md"
additional_standards = ["WGS", "PPS", "AAMHS"]
additional_standard_paths = ["D:\\.library\\aptlantis_core\\WGS\\README.md", "D:\\.library\\aptlantis_core\\PPS\\README.md", "D:\\.library\\aptlantis_core\\AAMHS\\README.md"]
inherits_from = "..\\DRS.manifest.toml"

[lifecycle]
state = "paused"
created = "2026-05-23"
last_reviewed = "2026-07-08"
maintainer = "Herb"

[paths]
root = "D:\\DRS\\FileCabinet"

[metadata]
created = "2026-05-23"
last_updated = "2026-06-19"
maintainer = "APTlantis"
license = "Unspecified"
language_primary = "VB.NET"
languages_used = [
  "VB.NET",
  "XAML",
  "PowerShell",
  "Markdown",
  "JSON",
  "TOML"
]

[runtime]
platform = "desktop"
environment = "Windows x64, self-contained .NET 10 WPF application"
services = []
storage = [
  "Local filesystem vault",
  "AppData catalog",
  "Vault items folder",
  "Vault thumbnails folder",
  "Vault extracted-text folder",
  "Vault exports folder",
  "Vault quarantine folder",
  "Vault repair log",
  "Application theme resources"
]

[relationships]
parent = "D:\\DRS"
child_projects = []
depends_on_projects = []
used_by_projects = []
external_dependencies = [
  ".NET 10",
  "WPF",
  "WiX Toolset 6.0.2",
  "Blake3 2.2.1",
  "StreamHash 1.11.3",
  "System.IO.Hashing 10.0.5",
  "MSTest"
]

[artifacts]
produces = [
  "artifacts/installer/FileCabinet-1.7.3.0-win-x64.msi",
  "docs/FileCabinet v1.6.0 — Health and Settings Release.md",
  "docs/FileCabinet v1.7.0 — Vault Health and Iconography Release.md",
  "docs/FileCabinet v1.7.1 — Hash Compatibility Patch.md",
  "docs/FileCabinet v1.7.2 — Repair Scalability Patch.md",
  "docs/FileCabinet v1.7.3 — Vault Health Workspace Patch.md",
  "docs/FileCabinet — Hash Choices and Compatibility.md",
  "Assets/MaterialSymbolsIconMap.md",
  "Assets/FileCabinet.ico",
  "Assets/FileCabinetLogoMark.png",
  "FileCabinet.Cli.exe",
  "Vault catalog JSON",
  "Vault thumbnail PNG assets",
  "Vault extracted text indexes",
  "Vault catalog backup exports",
  "Vault repair log JSONL history",
  "Deterministic vault package exports"
]
consumes = [
  "User-selected files and folders for vault ingestion",
  "Existing vault item files during rescan",
  "Existing catalog data from AppData"
]

[release]
version = "1.7.3"
name = "FileCabinet v1.7.3 — Vault Health Workspace Patch"
date = "2026-06-19"

[release.installer]
path = "artifacts/installer/FileCabinet-1.7.3.0-win-x64.msi"
runtime = "win-x64"
package_version = "1.7.3.0"
size_bytes = 128389120
sha256 = "71FEAF41CE935AA0A3D7E43CC3E515FC965032FBA1AE6CF5B7FF429B2C74212F"
blake3 = ""
kangaroo12 = ""

[release.signatures.pq]
path = ""
algorithm = "SPHINCS+"
size_bytes = 0
sha256 = ""
blake3 = ""
kangaroo12 = ""
status = "not generated"

[release.signatures.pgp]
path = ""
algorithm = "PGP"
status = "not generated"
detail = "v1.7.3 installer validation has not generated a detached PGP signature."

[release.verified]
date = "2026-06-19"
tests = "dotnet test FileCabinet.Tests/FileCabinet.Tests.vbproj --configuration Release --no-restore passed 104 tests"
installer_build = "installer/build-installer.ps1 -Version 1.7.3.0 completed"
release_hashing = "Get-FileHash -Algorithm SHA256 completed for artifacts/installer/FileCabinet-1.7.3.0-win-x64.msi"
release_signing = "not generated for this SHA-256-only patch release"

[[datasets]]
name = "FileCabinet catalog"
description = "Local JSON catalog containing vault metadata, artifact records, tags, categories, hashes, extracted text paths, thumbnail paths, activities, and UI preferences."
format = "JSON"
size = "User-dependent"
location = "%APPDATA%/FileCabinet/catalog.json"

[[datasets]]
name = "FileCabinet vault"
description = "Portable retained artifact storage containing items, thumbnails, extracted text, quarantine, and exports."
format = "Filesystem directory tree"
size = "User-dependent"
location = "User-selected vault root"

[[scripts]]
name = "installer/build-installer.ps1"
language = "PowerShell"
role = "Publishes the self-contained Windows x64 build and creates the WiX MSI installer."
status = "active"
version = 1

