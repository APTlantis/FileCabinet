[automation]
build = "dotnet test FileCabinet.Tests/FileCabinet.Tests.vbproj --configuration Release --no-restore; installer/build-installer.ps1 -Version 1.7.3.0; Get-FileHash -Algorithm SHA256 artifacts/installer/FileCabinet-1.7.3.0-win-x64.msi"
