[project]
id = "filecabinet"
title = "FileCabinet"
description = "Local-first Windows desktop vault for retaining, cataloging, previewing, verifying, and recovering high-signal technical artifacts."
type = "tool"
stage = "production"
version = "1.7.2"
tags = [
  "local-first",
  "desktop",
  "vault",
  "artifact-management",
  "metadata",
  "integrity-verification",
  "preview-pipeline",
  "neon-ink",
  "dark-theme",
  "wpf",
  "vbnet"
]

[metadata]
created = "2026-05-23"
last_updated = "2026-06-12"
maintainer = "APTlantis"
license = "Unspecified"
language_primary = "VB.NET"
languages_used = [
  "VB.NET",
  "XAML",
  "PowerShell",
  "Markdown",
  "JSON",
  "TOML"
]

[runtime]
platform = "desktop"
environment = "Windows x64, self-contained .NET 10 WPF application"
services = []
storage = [
  "Local filesystem vault",
  "AppData catalog",
  "Vault items folder",
  "Vault thumbnails folder",
  "Vault extracted-text folder",
  "Vault exports folder",
  "Vault quarantine folder",
  "Vault repair log",
  "Application theme resources"
]

[relationships]
depends_on_projects = []
used_by_projects = []
external_dependencies = [
  ".NET 10",
  "WPF",
  "WiX Toolset 6.0.2",
  "Blake3 2.2.1",
  "StreamHash 1.11.3",
  "System.IO.Hashing 10.0.5",
  "MSTest"
]

[artifacts]
produces = [
  "artifacts/installer/FileCabinet-1.7.2.0-win-x64.msi",
  "docs/FileCabinet v1.6.0 — Health and Settings Release.md",
  "docs/FileCabinet v1.7.0 — Vault Health and Iconography Release.md",
  "docs/FileCabinet v1.7.1 — Hash Compatibility Patch.md",
  "docs/FileCabinet v1.7.2 — Repair Scalability Patch.md",
  "Assets/MaterialSymbolsIconMap.md",
  "Assets/FileCabinet.ico",
  "Assets/FileCabinetLogoMark.png",
  "FileCabinet.Cli.exe",
  "Vault catalog JSON",
  "Vault thumbnail PNG assets",
  "Vault extracted text indexes",
  "Vault catalog backup exports",
  "Vault repair log JSONL history",
  "Deterministic vault package exports"
]
consumes = [
  "User-selected files and folders for vault ingestion",
  "Existing vault item files during rescan",
  "Existing catalog data from AppData"
]

[release]
version = "1.7.2"
name = "FileCabinet v1.7.2 — Repair Scalability Patch"
date = "2026-06-12"

[release.installer]
path = "artifacts/installer/FileCabinet-1.7.2.0-win-x64.msi"
runtime = "win-x64"
package_version = "1.7.2.0"
size_bytes = 127893504
sha256 = "9C14866B2CAB42C1B92DAEC08C12BF3C6E7F9E7617A4DE41C1D6AFAF66C7F13D"
blake3 = ""
kangaroo12 = ""

[release.signatures.pq]
path = ""
algorithm = "SPHINCS+"
size_bytes = 0
sha256 = ""
blake3 = ""
kangaroo12 = ""
status = "not generated"

[release.signatures.pgp]
path = ""
algorithm = "PGP"
status = "not generated"
detail = "v1.7.2 installer validation has not generated a detached PGP signature."

[release.verified]
date = "2026-06-12"
tests = "dotnet test FileCabinet.Tests/FileCabinet.Tests.vbproj passed 100 tests"
installer_build = "installer/build-installer.ps1 -Version 1.7.2.0 completed"
release_hashing = "Get-FileHash -Algorithm SHA256 completed for artifacts/installer/FileCabinet-1.7.2.0-win-x64.msi"
release_signing = "not generated for this SHA-256-only patch release"

[[datasets]]
name = "FileCabinet catalog"
description = "Local JSON catalog containing vault metadata, artifact records, tags, categories, hashes, extracted text paths, thumbnail paths, activities, and UI preferences."
format = "JSON"
size = "User-dependent"
location = "%APPDATA%/FileCabinet/catalog.json"

[[datasets]]
name = "FileCabinet vault"
description = "Portable retained artifact storage containing items, thumbnails, extracted text, quarantine, and exports."
format = "Filesystem directory tree"
size = "User-dependent"
location = "User-selected vault root"

[[scripts]]
name = "installer/build-installer.ps1"
language = "PowerShell"
role = "Publishes the self-contained Windows x64 build and creates the WiX MSI installer."
status = "active"
version = 1

[documentation]
writerside_topic = ""
readme = "README.md"
release_notes = "docs/FileCabinet v1.7.2 — Repair Scalability Patch.md"
theme_overview = "docs/NeonInk-Theme-Integration-Overview.md"
core_docs = [
  "docs/FileCabinet — Vault Lifecycle.md",
  "docs/FileCabinet — Trust and Verification Model.md",
  "docs/FileCabinet — Local-First Artifact Preservation.md",
  "docs/FileCabinet — The Deliberate Retention Tradeoff.md",
  "docs/FileCabinet — Repair and Recovery Guide.md",
  "docs/FileCabinet — Designing for Context Preservation.md",
  "docs/FileCabinet — Why Determinism Matters.md",
  "docs/FileCabinet — Why SHA-256 and BLAKE3.md",
  "docs/FileCabinet — Why VB.NET and WPF.md"
]

[links]
repository = "https://github.com/APTlantis/FileCabinet"
homepage = "https://github.com/APTlantis/FileCabinet"
dashboard = "https://github.com/APTlantis/FileCabinet/releases"

[structure]
repo_path = "D:/100-DRS/120-STORAGE/FileCabinet"
docs_path = "D:/100-DRS/120-STORAGE/FileCabinet/docs"
data_path = "User-selected vault root"

[automation]
build = "dotnet test FileCabinet.Tests/FileCabinet.Tests.vbproj; installer/build-installer.ps1 -Version 1.7.2.0; Get-FileHash -Algorithm SHA256 artifacts/installer/FileCabinet-1.7.2.0-win-x64.msi"
deploy = "Publish artifacts/installer/FileCabinet-1.7.2.0-win-x64.msi to the GitHub v1.7.2 release."
tasks = [
  "Run unit tests",
  "Build self-contained Windows x64 publish output",
  "Build WiX MSI installer",
  "Attach MSI to GitHub release",
  "Include release notes from docs/FileCabinet v1.7.2 — Repair Scalability Patch.md",
  "Record SHA-256 with Get-FileHash",
  "Document unsigned status"
]

[theme]
id = "neon-ink"
name = "Aptlantis Studio - Neon Ink"
mode = "dark"
resource_dictionary = "Themes/NeonInk.xaml"
merged_from = "Application.xaml"
principles = [
  "Semantic color over decorative neon",
  "Cyan and teal for navigation, focus, and structure",
  "Violet and purple for ingest, preview, process, and pipeline states",
  "Pink and magenta for featured, creative, and metadata emphasis",
  "Green, yellow, red, and orange reserved for health, attention, risk, and build/file-operation states"
]

[notes]
current_highlights = [
  "Neon Ink theme resources now live in a dedicated WPF ResourceDictionary",
  "MainWindow uses shared theme brushes instead of inline palette resources",
  "Cyan navigation fills were darkened for readable selected-row and route text",
  "Violet, purple, pink, magenta, orange, green, yellow, and red semantic accents are used across process, preview, metadata, build, health, attention, and risk states",
  "Preview and activity accents were refreshed to match Neon Ink semantics",
  "Application and installer icon assets were refreshed from the new FileCabinet logo mark",
  "Application, CLI, and manifest version updated to 1.7.2",
  "Added 24 optional compatibility hashes and checksums across archival, legacy, and fast hash families",
  "New non-legacy hash values are stored in the extensible artifact hashes dictionary",
  "Active hash computation now respects Settings across ingest, health, repair, rescan, and headless paths",
  "Details shows dynamic hash rows for all supported algorithms",
  "Vault Health promoted to a right-panel tab with findings, repair candidates, progress, actions, and repair history",
  "Material Symbols source vocabulary mapped to category-specific artifact list and preview icons",
  "Borderless maximize now respects the Windows taskbar work area",
  "Release verification for v1.7.2 records SHA-256 only with Get-FileHash",
  "FileCabinet-1.7.2.0-win-x64.msi was built and SHA-256 hashed on 2026-06-12",
  "Health analysis defers automatic hash mismatch verification for retained files larger than 16 GB",
  "Missing-hash analysis no longer hashes files when there are no comparable active catalog hashes",
  "Default cryptographic hash computation shares one sequential read pass for explicit ingest and repair hashing",
  "Murmur3-32 and xxHash64 compatibility hashes now stream instead of loading full files into memory"
]
not_in_scope = [
  "Automatic restore execution",
  "Automatic hash mismatch resolution",
  "Destructive cleanup of orphan generated assets"
]
design_boundaries = [
  "Deterministic recall over automatic inference",
  "Operator-authored context over generated categorization",
  "Inspectable metadata over opaque ranking",
  "Repairable local vault state over cloud dependency"
]
last_verified = "dotnet test FileCabinet.Tests/FileCabinet.Tests.vbproj passed 100 tests on 2026-06-12; installer/build-installer.ps1 -Version 1.7.2.0 completed; SHA-256 recorded with Get-FileHash; signing not generated"
